services:
  mysql:
    image: mysql:8.0
    container_name: minihdfs_mysql_${NODE_ID:-node1}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: hdfs_meta
      MYSQL_USER: hdfs_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hdfs_pass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hdfs_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "hdfs_user", "-p${MYSQL_PASSWORD:-hdfs_pass}"]
      interval: 5s
      timeout: 5s
      retries: 15

  node:
    build: .
    container_name: minihdfs_${NODE_ID:-node1}
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/workspace/data
    environment:
      - NODE_ID=${NODE_ID:-node1}
      - MY_IP=${MY_IP:-127.0.0.1}
      - PEER_IPS=${PEER_IPS:-}
      - API_PORT=8000
      - DB_URL=mysql+pymysql://hdfs_user:${MYSQL_PASSWORD:-hdfs_pass}@mysql:3306/hdfs_meta
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hdfs_net

networks:
  hdfs_net:
    driver: bridge

volumes:
  mysql_data: